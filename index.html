<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAM SST 4.0 - Painel de Controle Semântico</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light text-dark">
    <header class="bg-dark text-white py-3 mb-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h4 m-0 text-success fw-bold"><i class="bi bi-shield-fill-check"></i> CLAM SST 4.0</h1>
                <p class="small m-0 text-secondary">Sistema de Gestão e Conformidade de Segurança do Trabalho</p>
            </div>
            <button class="btn btn-sm btn-danger fw-bold" id="btnTwilio" onclick="dispararTwilio()">
                <i class="bi bi-whatsapp"></i> Notificar Vencimentos
            </button>
        </div>
    </header>

    <main class="container">
        
        <section class="card p-4 shadow-sm border-0 mb-4" aria-labelledby="tituloFormulario">
            <h2 class="h5 fw-bold text-secondary mb-3" id="tituloFormulario">📇 Cadastro / Edição de Colaborador</h2>
            
            <form id="formFuncionario" onsubmit="processarFormulario(event)">
                <input type="hidden" id="id_funcionario" name="id_funcionario">

                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <label class="form-label small fw-bold">Nome Completo</label>
                        <input type="text" id="nome" name="nome" class="form-control form-control-sm" placeholder="Ex: João da Silva" required>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label small fw-bold">CPF</label>
                        <input type="text" id="cpf" name="cpf" class="form-control form-control-sm" placeholder="000.000.000-00" required>
                    </div>
                    <div class="col-12 col-md-3">
                        <label class="form-label small fw-bold">Cargo</label>
                        <input type="text" id="cargo" name="cargo" class="form-control form-control-sm" placeholder="Ex: Técnico de Operações" required>
                    </div>
                    <div class="col-12 col-md-2">
                        <label class="form-label small fw-bold">Setor</label>
                        <input type="text" id="setor" name="setor" class="form-control form-control-sm" placeholder="Ex: Produção" required>
                    </div>
                </div>

                <div class="mt-3 d-flex gap-2 justify-content-end">
                    <button type="button" id="btnCancelar" class="btn btn-sm btn-secondary d-none" onclick="restaurarEstadoFormulario()">Cancelar Edição</button>
                    <button type="submit" id="btnSalvar" class="btn btn-sm btn-success fw-bold">Salvar Colaborador</button>
                </div>
            </form>
        </section>

        <section class="card p-4 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="h5 fw-bold text-secondary m-0">📋 Consultar Colaboradores Ativos</h2>
                <div class="d-flex gap-2">
                    <input type="text" id="buscaNome" class="form-control form-control-sm" placeholder="Filtrar por nome...">
                    <button class="btn btn-sm btn-primary" onclick="consultarFuncionarios()"><i class="bi bi-search"></i> Buscar</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle m-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nome Completo</th>
                            <th>CPF</th>
                            <th>Cargo</th>
                            <th>Setor</th>
                            <th class="text-center">Ações Gerenciais (U/D)</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer class="text-center text-muted small py-4 mt-5 border-top">
        <p class="m-0">&copy; 2026 CLAM Tech & Data - Engenharia de Software Aplicada.</p>
    </footer>

    <script>
        // Endpoint base mapeado para o servidor Flask local executado em ambiente de desenvolvimento
        const API_URL = "http://127.0.0.1:5000/api/funcionario";

        // Executa automaticamente a consulta de dados assim que a árvore do DOM estiver carregada
        document.addEventListener("DOMContentLoaded", consultarFuncionarios);

        // 1. OPERAÇÃO READ: BUSCAR/CONSULTAR DADOS DA API (GET)
        async function consultarFuncionarios() {
            const corpo = document.getElementById("corpoTabela");
            const busca = document.getElementById("buscaNome").value;
            
            // Injeta um feedback de carregamento assíncrono para melhorar a UX
            corpo.innerHTML = `<tr><td colspan="6" class="text-center py-3"><div class="spinner-border text-primary spinner-border-sm"></div> Consultando banco MySQL...</td></tr>`;

            try {
                // Monta a URL aceitando o parâmetro opcional de Query String cadastrado no seu app.py
                const urlCompleta = busca ? `${API_URL}/buscar?nome=${encodeURIComponent(busca)}` : `${API_URL}/buscar`;
                const resposta = await fetch(urlCompleta);
                
                if (!resposta.ok) throw new Error("Falha ao ler dados do servidor.");
                
                const funcionarios = await resposta.json();
                corpo.innerHTML = ""; // Limpa o indicador de carregamento

                if(funcionarios.length === 0) {
                    corpo.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-3">Nenhum funcionário encontrado.</td></tr>`;
                    return;
                }

                // Laço de repetição forEach varrendo o JSON e gerando as linhas do HTML
                funcionarios.forEach(func => {
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td>${func.id_funcionario}</td>
                        <td class="fw-bold text-dark">${func.nome}</td>
                        <td>${func.cpf}</td>
                        <td>${func.cargo}</td>
                        <td><span class="badge bg-secondary">${func.setor}</span></td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-outline-warning me-1" onclick='prepararEdicao(${JSON.stringify(func)})'>
                                <i class="bi bi-pencil-square"></i> Editar
                            </button>
                            <button class="btn btn-sm btn-outline-danger" onclick="excluirFuncionario(${func.id_funcionario})">
                                <i class="bi bi-trash3"></i> Excluir
                            </button>
                        </td>
                    `;
                    corpo.appendChild(tr);
                });
            } catch (erro) {
                corpo.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-3">Erro: ${erro.message}</td></tr>`;
            }
        }

        // 2. CONTROLADOR FLUXO: IDENTIFICA SE É UM NOVO CADASTRO (POST) OU ATUALIZAÇÃO (PUT)
        async function processarFormulario(event) {
            event.preventDefault(); // Impede o recarregamento automático da página

            const id = document.getElementById("id_funcionario").value;
            const payload = {
                nome: document.getElementById("nome").value,
                cpf: document.getElementById("cpf").value,
                cargo: document.getElementById("cargo").value,
                setor: document.getElementById("setor").value,
                // Workaround defensivo: Envia strings vazias para bater com os argumentos obrigatórios do seu construtor Funcionario no Python
                email: "", telefone: "", whatsapp: "" 
            };

            try {
                let resposta;
                if (id) {
                    // Se o ID existir no campo oculto, executa a Operação UPDATE (PUT)
                    resposta = await fetch(`${API_URL}/${id}`, {
                        method: "PUT",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                } else {
                    // Se o campo oculto estiver vazio, executa a Operação CREATE (POST)
                    resposta = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                }

                if (!resposta.ok) throw new Error("Erro ao salvar dados.");
                
                const resultado = await resposta.json();
                alert(resultado.mensagem);
                
                restaurarEstadoFormulario();
                consultarFuncionarios(); // Atualiza a listagem automaticamente na tela única
            } catch (erro) {
                alert("Erro operacional: " + erro.message);
            }
        }

        // 3. PREPARAÇÃO DO UPDATE: CAPTURA OS DADOS DA TABELA E JOGA NOS INPUTS DO FORMULÁRIO
        function prepararEdicao(func) {
            document.getElementById("id_funcionario").value = func.id_funcionario;
            document.getElementById("nome").value = func.nome;
            document.getElementById("cpf").value = func.cpf;
            document.getElementById("cargo").value = func.cargo;
            document.getElementById("setor").value = func.setor;

            // Altera elementos visuais para indicar o estado de edição ao aluno
            document.getElementById("tituloFormulario").innerText = "📝 Editando Colaborador ID: " + func.id_funcionario;
            document.getElementById("btnSalvar").className = "btn btn-sm btn-warning fw-bold";
            document.getElementById("btnSalvar").innerText = "Atualizar Dados";
            document.getElementById("btnCancelar").classList.remove("d-none");
        }

        // 4. OPERAÇÃO DELETE: EXCLUIR REGISTRO DO BANCO DE DADOS (DELETE)
        async function excluirFuncionario(id) {
            if (!confirm("Tem certeza que deseja remover este colaborador do sistema de SST?")) return;

            try {
                const resposta = await fetch(`${API_URL}/${id}`, { method: "DELETE" });
                if (!resposta.ok) throw new Error("Não foi possível deletar o registro.");
                
                const resultado = await resposta.json();
                alert(resultado.mensagem);
                consultarFuncionarios(); // Sincroniza a tabela imediatamente
            } catch (erro) {
                alert("Erro ao excluir: " + erro.message);
            }
        }

        // FUNÇÃO AUXILIAR: LIMPA FORMULÁRIO E RESTAURA O ESTADO VISUAL DA TELA
        function restaurarEstadoFormulario() {
            document.getElementById("formFuncionario").reset();
            document.getElementById("id_funcionario").value = "";
            document.getElementById("tituloFormulario").innerText = "📇 Cadastro de Colaborador";
            document.getElementById("btnSalvar").className = "btn btn-sm btn-success fw-bold";
            document.getElementById("btnSalvar").innerText = "Salvar Colaborador";
            document.getElementById("btnCancelar").className = "btn btn-sm btn-secondary d-none";
        }

        // 5. ACIONADOR OMNICHANNEL: DISPARAR ALERTAS VIA TWILIO
        async function dispararTwilio() {
            const btn = document.getElementById("btnTwilio");
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Notificando...`;

            try {
                const resposta = await fetch("http://127.0.0.1:5000/api/notificar-vencimentos", { method: "POST" });
                const resultado = await resposta.json();
                alert(resultado.mensagem || "Processamento concluído!");
            } catch (erro) {
                alert("Erro ao acionar Twilio: " + erro.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="bi bi-whatsapp"></i> Notificar Vencimentos`;
            }
        }
    </script>
</body>
</html>
